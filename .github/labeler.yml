ci:
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"

docs:
  - changed-files:
      - any-glob-to-any-file: "**/*.md"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.test.*"
          - "**/*.spec.*"
          - "src/__tests__/**"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "pnpm-lock.yaml"

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**/*.tsx"
          - "src/**/*.css"

backend:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**/*.ts"
          - "drizzle/**"
          - "drizzle.config.ts"
