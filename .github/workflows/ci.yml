name: CI

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  quality:
    name: Lint, Typecheck, Format, Unit
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_NAME: Nextjs Starter Template
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Prettier
        run: npm run format:check

      - name: Unit tests (Jest)
        run: npm run test

      - name: Unit tests (Vitest)
        run: npm run test:vitest

      - name: Build
        run: npm run build

  e2e:
    name: Playwright E2E
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      NEXT_PUBLIC_APP_NAME: Nextjs Starter Template
      APP_URL: ${{ secrets.APP_URL }}
      GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
      GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_SUBSCRIPTION_PRICE_ID: ${{ secrets.STRIPE_SUBSCRIPTION_PRICE_ID }}
      STRIPE_WEBHOOK_SECRET_KEY: ${{ secrets.STRIPE_WEBHOOK_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
