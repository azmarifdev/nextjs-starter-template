name: Package Manager Consistency

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-lockfile:
    name: npm lockfile check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install via npm
        run: npm ci

      - name: Verify package-lock is unchanged
        run: git diff --exit-code -- package-lock.json
