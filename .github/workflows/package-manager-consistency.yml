name: Package Manager Consistency

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pnpm-lockfile:
    name: pnpm lockfile check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install via pnpm
        run: pnpm install --frozen-lockfile

      - name: Verify pnpm-lock is unchanged
        run: git diff --exit-code -- pnpm-lock.yaml
