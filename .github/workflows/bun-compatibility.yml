name: Bun Compatibility

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bun-compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies (Bun)
        run: bun install --frozen-lockfile || bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Vitest
        run: bun run test

      - name: Build
        run: bun run build
