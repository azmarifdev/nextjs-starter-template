name: CodeHawk Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CodeHawk (non-blocking)
        id: codehawk
        continue-on-error: true
        timeout-minutes: 8
        run: pnpm run codehawk

      - name: CodeHawk warning
        if: steps.codehawk.outcome == 'failure'
        run: echo "CodeHawk reported issues. Review the workflow log; this check is non-blocking."
