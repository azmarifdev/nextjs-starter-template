name: CodeHawk Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CodeHawk (non-blocking)
        id: codehawk
        continue-on-error: true
        timeout-minutes: 8
        run: npm run codehawk

      - name: CodeHawk warning
        if: steps.codehawk.outcome == 'failure'
        run: echo "CodeHawk reported issues. Review the workflow log; this check is non-blocking."
