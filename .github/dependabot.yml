version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Asia/Dhaka
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automerge-candidate
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
    groups:
      dev-dependencies:
        dependency-type: development
      prod-dependencies:
        dependency-type: production

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Asia/Dhaka
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
